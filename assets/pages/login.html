<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | RedSpecter</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<!-- ===== NAVBAR WIDGET ===== -->
<div id="navbar-widget"></div>

<main style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
  <div class="form-container" style="width: 100%; max-width: 420px; margin: auto;">
    <h2 class="section-title" style="margin-bottom: 30px;">Login to <span>System</span></h2>

    <form>
      <div class="form-group">
        <label>Email Access</label>
        <input type="email" class="form-control" required placeholder="hacker@root.com">
      </div>

      <div class="form-group">
        <label>Passphrase</label>
        <input type="password" class="form-control" required placeholder="*******">
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 15px;">Login & Engage</button>
    </form>

    <div style="text-align: center; margin-top: 25px; color: var(--text-muted); font-size: 14px;">
      New here? <a href="signup.html" style="color: var(--primary-color); text-decoration: none;">Create an account</a>
    </div>
  </div>
</main>

<!-- ===== FOOTER WIDGET ===== -->
<div id="footer-widget"></div>

<script>var ROOT_PATH = "../";</script>
<script src="../components/navbar.js"></script>
<script src="../components/footer.js"></script>
<script src="../assets/js/script.js"></script>
</body>
</html>
