<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apply Now | RedSpecter</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<!-- ===== NAVBAR WIDGET ===== -->
<div id="navbar-widget"></div>

<main>
<section class="apply" style="margin-top: 20px;">
  <div class="apply-wrap">
    <h2 class="apply-title">Apply Now</h2>
    <p class="apply-sub">Join the next generation of ethical hackers</p>

    <form id="applyForm" class="apply-form" action="https://api.web3forms.com/submit" method="POST">
      <input type="hidden" name="access_key" value="447e3acb-c948-4eee-88af-2bd7f8b2c656">
      <input type="hidden" name="subject" value="New Student Application - Redspector Hacker Academy">
      <input type="checkbox" name="botcheck" style="display:none">

      <div class="field">
        <input type="text" name="name" required placeholder=" ">
        <label>Full Name</label>
      </div>

      <div class="field">
        <input type="email" name="email" required placeholder=" ">
        <label>Email Address</label>
      </div>

      <div class="field">
        <input type="tel" name="phone" required placeholder=" ">
        <label>Contact Number</label>
      </div>

      <div class="field">
        <input type="text" name="location" required placeholder=" ">
        <label>Your Location</label>
      </div>

      <div class="field">
        <select name="program" required>
          <option value="" disabled selected></option>
          <option>Starter Hacker</option>
          <option>Web Pentester</option>
        </select>
        <label>Choose Program</label>
      </div>

      <button id="submitBtn" class="submit-btn" style="width: 100%;">
        🚀 Submit Application
      </button>

      <div class="success" id="successMsg">
        ✅ Application submitted successfully!
      </div>
    </form>
  </div>
</section>
</main>

<!-- ===== FOOTER WIDGET ===== -->
<div id="footer-widget"></div>

<script>var ROOT_PATH = "../";</script>
<script src="../components/navbar.js"></script>
<script src="../components/footer.js"></script>
<script src="../assets/js/script.js"></script>
<script>
const form = document.getElementById("applyForm");
const btn = document.getElementById("submitBtn");
const success = document.getElementById("successMsg");

form.addEventListener("submit", function(){
  btn.style.opacity = ".6";
  btn.style.pointerEvents = "none";
  btn.innerText="Submitting...";

  setTimeout(()=>{
    success.style.display="block";
  },2000);
});
</script>

</body>
</html>
