<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Labs | RedSpecter</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- ===== NAVBAR WIDGET ===== -->
  <div id="navbar-widget"></div>

  <!-- ===== MAIN CONTENT ===== -->
  <main style="display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px;">
    
    <div style="text-align: center; margin-bottom: 30px; max-width: 800px;">
      <h2 class="section-title" style="margin-bottom: 20px;">Virtual <span>Labs</span></h2>
      <p style="color: var(--text-muted); font-size: 16px;">
        Practice your command-line skills. Type <code style="color:var(--primary-color);">help</code> to see a list of available Linux commands.
      </p>
    </div>

    <!-- ===== INTERACTIVE TERMINAL ===== -->
    <div class="interactive-terminal">
      <div class="terminal-header">
        <div class="terminal-dots"><span></span><span></span><span></span></div>
        <div class="terminal-title">root@redspecter-lab:~</div>
      </div>
      <div class="terminal-body" id="interactive-terminal-body" onclick="document.getElementById('terminal-input').focus()">
        <div class="terminal-history" id="terminal-history">
          <p>Welcome to RedSpecter Virtual OS v1.0.</p>
          <p>System initialized. Ready for commands.</p>
        </div>
        <div class="terminal-input-line">
          <span class="prompt">root@redspecter:~#</span>
          <input type="text" id="terminal-input" autocomplete="off" spellcheck="false" autofocus>
        </div>
      </div>
    </div>

  </main>

  <!-- ===== FOOTER WIDGET ===== -->
  <div id="footer-widget"></div>

  <!-- Scripts -->
  <script>var ROOT_PATH = "./";</script>
  <script src="components/navbar.js"></script>
  <script src="components/footer.js"></script>
  <script src="assets/js/script.js"></script>
  <script src="assets/js/terminal.js"></script>

</body>
</html>
