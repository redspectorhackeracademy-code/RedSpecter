<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RedSpecter Cyber Lab</title>

<style>
:root{
--bg:#0f172a;
--card:#1e293b;
--red:#ff3e3e;
--green:#00ff41;
--border:#334155;
}

body{
margin:0;
background:var(--bg);
color:white;
font-family:Segoe UI;
display:flex;
height:100vh;
overflow:hidden;
}

canvas{position:fixed;z-index:-1;}

nav{
width:240px;
background:#020617;
padding:20px;
border-right:1px solid var(--border);
}

.logo{color:var(--red);font-size:22px;font-weight:bold;}
.user{color:#64748b;margin-bottom:20px;}

.nav-item{padding:6px 0;color:#94a3b8;}
.active{color:var(--red);}

main{flex:1;display:flex;}

.left{
width:45%;
padding:30px;
overflow:auto;
border-right:1px solid var(--border);
}

.card{
background:var(--card);
padding:20px;
margin-bottom:20px;
border-left:4px solid var(--red);
border-radius:6px;
}

input{
width:100%;
padding:10px;
background:#0f172a;
border:1px solid var(--border);
color:white;
border-radius:4px;
}

button{
margin-top:10px;
padding:10px;
border:none;
border-radius:4px;
cursor:pointer;
}

.deploy{background:var(--green);}
.submit{background:var(--red);color:white;}

.hint-box{
display:none;
background:#020617;
padding:10px;
margin-top:10px;
border:1px dashed var(--border);
}

/* TERMINAL */
.right{
width:55%;
background:black;
display:flex;
flex-direction:column;
}

.output{
flex:1;
padding:20px;
font-family:monospace;
color:var(--green);
overflow:auto;
}

.input-line{
display:flex;
padding:10px;
background:#050505;
}

.cli{
background:transparent;
border:none;
color:var(--green);
outline:none;
flex:1;
}
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<canvas id="matrix"></canvas>

<nav>
<div class="logo">REDSPECTER</div>
<div class="user" id="user"></div>
<div id="nav"></div>
<button onclick="showLeaderboard()">🏆 Leaderboard</button>
</nav>

<main>

<div class="left">
<h2 id="title"></h2>

<div class="card">
<p id="desc"></p>
<button class="deploy" onclick="deploy()">Deploy Machine</button>
</div>

<div class="card">
<input id="flag" placeholder="Enter flag">
<button class="submit" onclick="checkFlag()">Submit</button>
<p id="msg"></p>

<button onclick="toggleHint()">💡 Hint</button>
<div id="hintBox" class="hint-box"></div>
</div>
</div>

<div class="right">
<div id="out" class="output">[ SYSTEM OFFLINE ]</div>

<div class="input-line">
<span style="color:red">$</span>
<input id="cmd" class="cli">
</div>
</div>

</main>

<script>

/* USER */
let user = localStorage.getItem("user") || prompt("Hacker Name:");
localStorage.setItem("user", user);
document.getElementById("user").innerText="User: "+user;

let progress = parseInt(localStorage.getItem("level")) || 0;
let hintIndex = 0;

/* ===== LEVELS ===== */
const levels = [

{
title:"Level 1: Hidden File",
desc:"Find hidden file",
hint:["Use ls -la"],
flag:"THM{HIDDEN}",
commands:{
"ls":"file.txt",
"ls -la":".secret",
"cat .secret":"THM{HIDDEN}"
}
},

{
title:"Level 2: Grep",
desc:"Find password",
hint:["Use grep password"],
flag:"THM{GREP}",
commands:{
"cat data.txt":"user ok\npassword:THM{GREP}",
"grep password data.txt":"THM{GREP}"
}
},

{
title:"Level 3: Base64",
desc:"Decode file",
hint:["Use base64 -d"],
flag:"THM{BASE64}",
commands:{
"cat enc.txt":"VEhNe0JBU0U2NH0=",
"base64 -d enc.txt":"THM{BASE64}"
}
},

...Array.from({length:47},(_,i)=>({
title:`Level ${4+i}`,
desc:"Find flag using commands",
hint:["Try ls, cat, grep"],
flag:`THM{LEVEL_${4+i}}`,
commands:{
"ls":"file.txt",
"cat file.txt":`THM{LEVEL_${4+i}}`,
"grep THM file.txt":`THM{LEVEL_${4+i}}`
}
}))

];

/* INIT */
function loadLevel(){
hintIndex = 0;

if(progress>=levels.length){
document.getElementById("title").innerText="🎉 Completed!";
return;
}

document.getElementById("title").innerText=levels[progress].title;
document.getElementById("desc").innerText=levels[progress].desc;
updateNav();
}

/* NAV */
function updateNav(){
let nav=document.getElementById("nav");
nav.innerHTML="";
levels.forEach((l,i)=>{
let d=document.createElement("div");
d.className="nav-item "+(i===progress?"active":"");
d.innerText=(i<=progress?"✔ ":"🔒 ")+l.title;
nav.appendChild(d);
});
}

/* DEPLOY */
let active=false;
function deploy(){
active=true;
document.getElementById("out").innerHTML="Connected to RedSpecter Lab...";
}

/* TERMINAL */
document.getElementById("cmd").addEventListener("keydown",e=>{
if(e.key==="Enter"){
let cmd=e.target.value.trim();
print("$ "+cmd);

if(!active){
print("Deploy machine first");
return;
}

process(cmd);
e.target.value="";
}
});

function process(cmd){

let parts = cmd.split(" ");
let base = parts[0];

/* BASIC */

if(cmd==="clear"){
document.getElementById("out").innerHTML="";
return;
}

if(cmd==="help"){
print("ls, ls -la, cat, grep, pwd, whoami, history");
return;
}

if(cmd==="whoami"){
print(user);
return;
}

if(cmd==="pwd"){
print("/home/"+user.toLowerCase());
return;
}

/* LS */

if(cmd==="ls"){
print(levels[progress].commands["ls"] || "file.txt");
return;
}

if(cmd==="ls -la"){
print(levels[progress].commands["ls -la"] || ".hidden file.txt");
return;
}

/* CAT */

if(base==="cat"){
let key = `cat ${parts[1]}`;
let res = levels[progress].commands[key];

if(res){
print(res);
if(res.includes("THM{")){
document.getElementById("flag").value=res;
}
}else{
print("No such file");
}
return;
}

/* GREP */

if(base==="grep"){
let res = levels[progress].commands[cmd];
if(res){
print(res);
}else{
print("No match");
}
return;
}

/* HISTORY */

if(cmd==="history"){
print("ls\ncat file.txt\ngrep THM file.txt");
return;
}

print("command not found");
}

/* FLAG */
function checkFlag(){
let f=document.getElementById("flag").value;
let msg=document.getElementById("msg");

if(f===levels[progress].flag){
msg.style.color="#00ff41";
msg.innerText="Correct!";

progress++;
localStorage.setItem("level",progress);
updateBoard();
loadLevel();

}else{
msg.style.color="#ff3e3e";
msg.innerText="Wrong flag";
}
}

/* HINT */
function toggleHint(){
let box=document.getElementById("hintBox");
let hints=levels[progress].hint;

box.style.display="block";
box.innerText=hints[hintIndex];

if(hintIndex<hints.length-1) hintIndex++;
}

/* PRINT */
function print(t){
let p=document.createElement("div");
p.innerText=t;
document.getElementById("out").appendChild(p);
}

/* LEADERBOARD */
function updateBoard(){
let b=JSON.parse(localStorage.getItem("board"))||[];
let u=b.find(x=>x.name===user);

if(u)u.level=progress;
else b.push({name:user,level:progress});

localStorage.setItem("board",JSON.stringify(b));
}

function showLeaderboard(){
let b=JSON.parse(localStorage.getItem("board"))||[];
b.sort((a,b)=>b.level-a.level);

let txt="🏆 Leaderboard\n";
b.forEach(x=>txt+=x.name+" - Level "+x.level+"\n");

alert(txt);
}

/* MATRIX */
const c=document.getElementById("matrix");
const ctx=c.getContext("2d");
c.height=window.innerHeight;
c.width=window.innerWidth;

let letters="01";
let font=14;
let cols=c.width/font;
let drops=Array(Math.floor(cols)).fill(1);

function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,c.width,c.height);
ctx.fillStyle="#00ff41";
ctx.font=font+"px monospace";

drops.forEach((y,i)=>{
let text=letters[Math.floor(Math.random()*2)];
ctx.fillText(text,i*font,y*font);
if(y*font>c.height && Math.random()>0.975) drops[i]=0;
drops[i]++;
});
}

setInterval(draw,40);

loadLevel();

</script>
</body>
</html>
