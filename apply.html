<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apply Now</title>

<style>

/* ===== GLOBAL ===== */
*{box-sizing:border-box;}

html,body{
margin:0;
padding:0;
background:#05080d;
font-family:Arial, Helvetica, sans-serif;
}

/* ===== APPLY SECTION ===== */

.apply{
padding:100px 20px;
background:
radial-gradient(circle at 20% 20%, rgba(0,255,170,0.08), transparent 40%),
radial-gradient(circle at 80% 80%, rgba(0,200,255,0.08), transparent 40%),
#05080d;
min-height:100vh;
}

.apply-wrap{
max-width:600px;
margin:auto;
}

.apply-title{
text-align:center;
font-size:42px;
margin-bottom:10px;
background:linear-gradient(90deg,#00ffae,#00cfff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.apply-sub{
text-align:center;
color:#8fa3b0;
margin-bottom:50px;
}

.apply-form{
display:flex;
flex-direction:column;
gap:24px;
}

.field{
position:relative;
}

.field input,
.field select{
width:100%;
padding:18px 14px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(0,255,170,0.15);
border-radius:12px;
color:#00ffae;
font-size:15px;
outline:none;
}

.field label{
position:absolute;
left:14px;
top:50%;
transform:translateY(-50%);
color:#7f95a3;
font-size:14px;
pointer-events:none;
transition:.25s;
background:#05080d;
padding:0 6px;
}

.field input:focus + label,
.field input:not(:placeholder-shown) + label,
.field select:focus + label,
.field select:valid + label{
top:-8px;
font-size:12px;
color:#00ffae;
}

.submit-btn{
padding:18px;
border:none;
border-radius:14px;
font-size:16px;
font-weight:600;
color:#001a12;
background:linear-gradient(90deg,#00ffae,#00cfff);
cursor:pointer;
}

.submit-btn:hover{
box-shadow:0 10px 30px rgba(0,255,170,0.35);
}

/* MOBILE */

@media(max-width:600px){

.apply{padding:70px 16px;}

.apply-title{font-size:32px;}

}

</style>
</head>

<body>

<section id="apply" class="apply">

<div class="apply-wrap">

<h2 class="apply-title">Apply Now</h2>
<p class="apply-sub">Join the next generation of ethical hackers</p>

<!-- WEB3FORMS FORM -->
<form class="apply-form"
action="https://api.web3forms.com/submit"
method="POST">

<!-- ACCESS KEY -->
<input type="hidden" name="access_key"
value="447e3acb-c948-4eee-88af-2bd7f8b2c656">

<!-- SUBJECT -->
<input type="hidden"
name="subject"
value="New Student Application - Redspector Hacker Academy">

<!-- REDIRECT AFTER SUBMIT -->
<input type="hidden"
name="redirect"
value="https://web3forms.com/success">

<div class="field">
<input type="text"
name="name"
required
placeholder=" ">
<label>Full Name</label>
</div>

<div class="field">
<input type="email"
name="email"
required
placeholder=" ">
<label>Email Address</label>
</div>

<div class="field">
<input type="tel"
name="phone"
required
placeholder=" ">
<label>Contact Number</label>
</div>

<div class="field">
<input type="text"
name="location"
required
placeholder=" ">
<label>Your Location</label>
</div>

<div class="field">

<select name="program" required>
<option value="" disabled selected></option>
<option>Starter Hacker</option>
<option>Web Pentester</option>
</select>

<label>Choose Program</label>

</div>

<button class="submit-btn">
🚀 Submit Application
</button>

</form>

</div>

</section>

</body>
</html>
