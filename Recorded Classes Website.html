<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recorded Classes</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-black text-white">

<!-- Moving Watermark -->
<div id="watermark"
class="fixed text-white/20 text-sm pointer-events-none z-50 font-bold">
USER123
</div>

<div class="min-h-screen grid grid-cols-12">

<!-- Sidebar -->
<div class="col-span-3 border-r border-red-900/40 p-5 bg-gradient-to-b from-black to-zinc-950">

<h1 class="text-2xl font-bold text-red-500 mb-1 tracking-wide">BROTYPE</h1>
<p class="text-xs text-gray-500 mb-6">Brother You Never Had</p>

<div id="videoList" class="space-y-2"></div>

</div>

<!-- Player -->
<div class="col-span-9 p-6">

<div id="emptyState"
class="h-full flex items-center justify-center text-gray-500">
Select a video to start learning
</div>

<div id="playerSection" class="hidden space-y-4">

<h2 id="videoTitle" class="text-xl font-semibold"></h2>

<video id="videoPlayer"
controls
controlsList="nodownload noremoteplayback"
disablePictureInPicture
class="w-full rounded-2xl border border-zinc-800">
</video>

</div>

</div>

</div>

<script>

// ================= VIDEO LIST =================

const VIDEOS = [

{
id:1,
title:"Part 1 | Introduction to Web Designing",
url:"https://www.w3schools.com/html/mov_bbb.mp4"
},

{
id:2,
title:"Part 2 | HTML Basics",
url:"https://www.w3schools.com/html/movie.mp4"
},

{
id:3,
title:"Part 3 | CSS Fundamentals",
url:"https://www.w3schools.com/html/mov_bbb.mp4"
},

{
id:4,
title:"Part 4 | JavaScript Intro",
url:"https://www.w3schools.com/html/movie.mp4"
}

];


// ================= ELEMENTS =================

const videoList = document.getElementById("videoList");
const player = document.getElementById("videoPlayer");
const titleEl = document.getElementById("videoTitle");
const emptyState = document.getElementById("emptyState");
const playerSection = document.getElementById("playerSection");


// ================= RENDER VIDEO LIST =================

function renderVideos(){

videoList.innerHTML = "";

VIDEOS.forEach(video => {

const card = document.createElement("div");

card.className =
"bg-zinc-900 border border-zinc-800 p-3 rounded-xl flex gap-3 items-center cursor-pointer hover:border-red-600 hover:bg-zinc-800 transition";

card.innerHTML = `
<span class="text-red-500">▶️</span>
<p class="text-sm">${video.title}</p>
`;

card.onclick = () => playVideo(video);

videoList.appendChild(card);

});

}


// ================= PLAY VIDEO =================

function playVideo(video){

emptyState.classList.add("hidden");
playerSection.classList.remove("hidden");

player.src = video.url;
titleEl.textContent = video.title;

}


// ================= ANTI RECORDING =================

// disable right click
window.addEventListener("contextmenu", e => e.preventDefault());

// block some keys
document.addEventListener("keydown", e => {

if(
e.key === "PrintScreen" ||
(e.ctrlKey && ["s","u","p"].includes(e.key.toLowerCase()))
){
e.preventDefault();
}

});

// pause when tab hidden
document.addEventListener("visibilitychange", () => {

if(document.hidden){
player.pause();
}

});

// devtools detection
setInterval(() => {

const threshold = 160;

if(window.outerWidth - window.innerWidth > threshold){
player.pause();
}

},1000);


// ================= MOVING WATERMARK =================

setInterval(() => {

const wm = document.getElementById("watermark");

wm.style.top = Math.random()*80 + "%";
wm.style.left = Math.random()*80 + "%";

},3000);


// ================= INIT =================

renderVideos();

</script>

</body>
</html>
